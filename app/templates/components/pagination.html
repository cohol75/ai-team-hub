{% if total_pages > 1 %}
<div class="pagination">
  {% if page > 1 %}
  <a href="?page={{ page - 1 }}&search={{ search }}">&laquo;</a>
  {% endif %}

  {% for p in range(1, total_pages + 1) %}
    {% if p == page %}
    <span class="current">{{ p }}</span>
    {% else %}
    <a href="?page={{ p }}&search={{ search }}">{{ p }}</a>
    {% endif %}
  {% endfor %}

  {% if page < total_pages %}
  <a href="?page={{ page + 1 }}&search={{ search }}">&raquo;</a>
  {% endif %}
</div>
{% endif %}
