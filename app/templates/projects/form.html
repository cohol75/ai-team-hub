{% extends "base.html" %}
{% block content %}
<div class="page-header">
  <h1>{% if project %}编辑项目{% else %}发布新公告{% endif %}</h1>
</div>

<form method="post"
      action="{% if project %}/projects/{{ project.id }}/edit{% else %}/projects/new{% endif %}">
  <div class="form-group">
    <label>标题</label>
    <input type="text" class="form-control" name="title" required maxlength="200"
           value="{{ project.title if project else '' }}">
  </div>

  <div class="form-group">
    <label>作者</label>
    <input type="text" class="form-control" name="author" required maxlength="100"
           value="{{ project.author if project else '' }}">
  </div>

  <div class="form-group">
    <label>内容（Markdown）</label>
    <textarea class="form-control" name="content" required style="min-height:280px;">{{ project.content if project else '' }}</textarea>
  </div>

  <button type="submit" class="btn btn-primary">
    {% if project %}更新{% else %}发布{% endif %}
  </button>
  <a href="{% if project %}/projects/{{ project.id }}{% else %}/projects{% endif %}" class="btn btn-outline">取消</a>
</form>
{% endblock %}
